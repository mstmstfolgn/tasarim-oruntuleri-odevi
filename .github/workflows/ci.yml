name: CI Pipeline

on:
  push:
    branches: [ "main", "phase-3" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Checkout Yap (Indir)
      uses: actions/checkout@v4

    - name: .NET Kur
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 
        
    - name: Projeyi Derle (Build)
      run: dotnet build ETicaretSepeti/ETicaretSepeti.sln